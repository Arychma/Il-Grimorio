<!-- Password Protection — paste this just after <body> in src/_includes/base.njk -->
<style>
  #pw-overlay {
    position: fixed;
    inset: 0;
    background: #12090a;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 9999;
    font-family: 'Cinzel', serif;
  }
  #pw-box {
    text-align: center;
    padding: 48px 40px;
    border: 1px solid #c8922a;
    max-width: 360px;
    width: 90%;
  }
  #pw-box h2 {
    color: #e8b84b;
    font-size: 1.4rem;
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(200,146,42,0.4);
  }
  #pw-box p {
    color: #4a3728;
    font-family: 'IM Fell English', serif;
    font-size: 0.9rem;
    margin-bottom: 28px;
    font-style: italic;
  }
  #pw-input {
    width: 100%;
    padding: 10px 14px;
    background: #1c1005;
    border: 1px solid #3a2510;
    color: #e8b84b;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1rem;
    text-align: center;
    letter-spacing: 0.2em;
    outline: none;
    margin-bottom: 12px;
  }
  #pw-input:focus { border-color: #c8922a; }
  #pw-btn {
    width: 100%;
    padding: 10px;
    background: #8b1a1a;
    color: #f2e8d5;
    border: none;
    font-family: 'Cinzel', serif;
    font-size: 0.9rem;
    letter-spacing: 0.15em;
    cursor: pointer;
    transition: background 0.15s;
  }
  #pw-btn:hover { background: #a52020; }
  #pw-error {
    color: #8b1a1a;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    margin-top: 10px;
    min-height: 1em;
  }
</style>

<div id="pw-overlay">
  <div id="pw-box">
    <h2>Khaesil e oltre</h2>
    <p>Di' amico, ed entra.</p>
    <input id="pw-input" type="password" placeholder="···" autofocus />
    <button id="pw-btn" onclick="checkPassword()">ENTER</button>
    <div id="pw-error"></div>
  </div>
</div>

<script>
  // ── Change YOURPASSWORD to your actual password ──
  const SITE_PASSWORD = "Mellon";
  const STORAGE_KEY   = "grimoire_auth";

  // If already authenticated, hide the overlay immediately
  if (sessionStorage.getItem(STORAGE_KEY) === "true") {
    document.getElementById("pw-overlay").style.display = "none";
  }

  function checkPassword() {
    const input = document.getElementById("pw-input").value;
    if (input === SITE_PASSWORD) {
      sessionStorage.setItem(STORAGE_KEY, "true");
      document.getElementById("pw-overlay").style.display = "none";
    } else {
      document.getElementById("pw-error").textContent = "Wrong password. Try again.";
      document.getElementById("pw-input").value = "";
      document.getElementById("pw-input").focus();
    }
  }

  // Allow pressing Enter to submit
  document.getElementById("pw-input").addEventListener("keydown", function(e) {
    if (e.key === "Enter") checkPassword();
  });
</script>
